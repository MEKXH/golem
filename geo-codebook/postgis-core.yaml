name: postgis-core
description: Common verified PostGIS query patterns for geo analysis
patterns:
  - name: point-buffer-count
    description: Count features within a buffer around a point
    tags: [buffer, count, point, proximity]
    template: |
      SELECT COUNT(*) FROM {{target_table}}
      WHERE ST_DWithin(
        {{geom_col}}::geography,
        ST_SetSRID(ST_MakePoint({{lon}}, {{lat}}), 4326)::geography,
        {{distance_m}}
      )
    variables:
      target_table: { type: table, required: true }
      geom_col: { type: column, default: geom }
      lon: { type: float, required: true }
      lat: { type: float, required: true }
      distance_m: { type: float, required: true }
    verified: true
    success_rate: 0.98

  - name: nearest-neighbor
    description: Find the nearest feature to a point
    tags: [nearest, distance, point]
    template: |
      SELECT * FROM {{target_table}}
      ORDER BY {{geom_col}} <-> ST_SetSRID(ST_MakePoint({{lon}}, {{lat}}), 4326)
      LIMIT 1
    variables:
      target_table: { type: table, required: true }
      geom_col: { type: column, default: geom }
      lon: { type: float, required: true }
      lat: { type: float, required: true }
    verified: true
    success_rate: 0.97

  - name: polygon-contains-point
    description: Find polygons containing a point
    tags: [contains, polygon, point]
    template: |
      SELECT * FROM {{target_table}}
      WHERE ST_Contains(
        {{geom_col}},
        ST_SetSRID(ST_MakePoint({{lon}}, {{lat}}), 4326)
      )
    variables:
      target_table: { type: table, required: true }
      geom_col: { type: column, default: geom }
      lon: { type: float, required: true }
      lat: { type: float, required: true }
    verified: true
    success_rate: 0.96

  - name: intersects-boundary
    description: Find features intersecting a named boundary geometry
    tags: [intersects, boundary, overlay]
    template: |
      SELECT t.* FROM {{target_table}} t
      JOIN {{boundary_table}} b ON ST_Intersects(t.{{geom_col}}, b.{{boundary_geom_col}})
      WHERE b.{{boundary_name_col}} = '{{boundary_name}}'
    variables:
      target_table: { type: table, required: true }
      boundary_table: { type: table, required: true }
      geom_col: { type: column, default: geom }
      boundary_geom_col: { type: column, default: geom }
      boundary_name_col: { type: column, default: name }
      boundary_name: { type: string, required: true }
    verified: true
    success_rate: 0.95

  - name: within-distance-join
    description: Join two layers by a distance threshold
    tags: [join, distance, proximity]
    template: |
      SELECT a.*, b.*
      FROM {{left_table}} a
      JOIN {{right_table}} b
        ON ST_DWithin(a.{{left_geom_col}}::geography, b.{{right_geom_col}}::geography, {{distance_m}})
    variables:
      left_table: { type: table, required: true }
      right_table: { type: table, required: true }
      left_geom_col: { type: column, default: geom }
      right_geom_col: { type: column, default: geom }
      distance_m: { type: float, required: true }
    verified: true
    success_rate: 0.95

  - name: buffer-intersection-count
    description: Count target features intersecting a buffered source layer
    tags: [buffer, intersects, count]
    template: |
      SELECT COUNT(*)
      FROM {{target_table}} t
      JOIN (
        SELECT ST_Buffer({{source_geom_col}}::geography, {{distance_m}})::geometry AS geom
        FROM {{source_table}}
      ) s ON ST_Intersects(t.{{target_geom_col}}, s.geom)
    variables:
      source_table: { type: table, required: true }
      target_table: { type: table, required: true }
      source_geom_col: { type: column, default: geom }
      target_geom_col: { type: column, default: geom }
      distance_m: { type: float, required: true }
    verified: true
    success_rate: 0.94

  - name: polygon-overlap-area
    description: Compute overlap area between two polygon layers
    tags: [area, overlap, polygon]
    template: |
      SELECT a.{{left_id_col}}, b.{{right_id_col}},
             ST_Area(ST_Intersection(a.{{left_geom_col}}, b.{{right_geom_col}})) AS overlap_area
      FROM {{left_table}} a
      JOIN {{right_table}} b ON ST_Intersects(a.{{left_geom_col}}, b.{{right_geom_col}})
    variables:
      left_table: { type: table, required: true }
      right_table: { type: table, required: true }
      left_id_col: { type: column, default: id }
      right_id_col: { type: column, default: id }
      left_geom_col: { type: column, default: geom }
      right_geom_col: { type: column, default: geom }
    verified: true
    success_rate: 0.94

  - name: clip-features-to-boundary
    description: Clip a feature layer to a named boundary geometry
    tags: [clip, boundary, intersection]
    template: |
      SELECT t.{{id_col}},
             ST_Intersection(t.{{geom_col}}, b.{{boundary_geom_col}}) AS geom
      FROM {{target_table}} t
      JOIN {{boundary_table}} b ON ST_Intersects(t.{{geom_col}}, b.{{boundary_geom_col}})
      WHERE b.{{boundary_name_col}} = '{{boundary_name}}'
    variables:
      target_table: { type: table, required: true }
      boundary_table: { type: table, required: true }
      id_col: { type: column, default: id }
      geom_col: { type: column, default: geom }
      boundary_geom_col: { type: column, default: geom }
      boundary_name_col: { type: column, default: name }
      boundary_name: { type: string, required: true }
    verified: true
    success_rate: 0.93

  - name: aggregate-count-by-boundary
    description: Count features by named boundary polygons
    tags: [aggregate, count, boundary]
    template: |
      SELECT b.{{boundary_name_col}}, COUNT(t.*) AS feature_count
      FROM {{boundary_table}} b
      LEFT JOIN {{target_table}} t ON ST_Intersects(t.{{geom_col}}, b.{{boundary_geom_col}})
      GROUP BY b.{{boundary_name_col}}
      ORDER BY feature_count DESC
    variables:
      boundary_table: { type: table, required: true }
      target_table: { type: table, required: true }
      boundary_name_col: { type: column, default: name }
      boundary_geom_col: { type: column, default: geom }
      geom_col: { type: column, default: geom }
    verified: true
    success_rate: 0.93

  - name: aggregate-sum-by-boundary
    description: Sum an attribute by named boundary polygons
    tags: [aggregate, sum, boundary]
    template: |
      SELECT b.{{boundary_name_col}}, COALESCE(SUM(t.{{value_col}}), 0) AS total_value
      FROM {{boundary_table}} b
      LEFT JOIN {{target_table}} t ON ST_Intersects(t.{{geom_col}}, b.{{boundary_geom_col}})
      GROUP BY b.{{boundary_name_col}}
      ORDER BY total_value DESC
    variables:
      boundary_table: { type: table, required: true }
      target_table: { type: table, required: true }
      value_col: { type: column, required: true }
      boundary_name_col: { type: column, default: name }
      boundary_geom_col: { type: column, default: geom }
      geom_col: { type: column, default: geom }
    verified: true
    success_rate: 0.92

  - name: aggregate-avg-by-boundary
    description: Average an attribute by named boundary polygons
    tags: [aggregate, average, boundary]
    template: |
      SELECT b.{{boundary_name_col}}, AVG(t.{{value_col}}) AS avg_value
      FROM {{boundary_table}} b
      JOIN {{target_table}} t ON ST_Intersects(t.{{geom_col}}, b.{{boundary_geom_col}})
      GROUP BY b.{{boundary_name_col}}
      ORDER BY avg_value DESC
    variables:
      boundary_table: { type: table, required: true }
      target_table: { type: table, required: true }
      value_col: { type: column, required: true }
      boundary_name_col: { type: column, default: name }
      boundary_geom_col: { type: column, default: geom }
      geom_col: { type: column, default: geom }
    verified: true
    success_rate: 0.92

  - name: points-in-polygons-count
    description: Count points inside each polygon
    tags: [point, polygon, count, join]
    template: |
      SELECT p.{{polygon_id_col}}, COUNT(pt.*) AS point_count
      FROM {{polygon_table}} p
      LEFT JOIN {{point_table}} pt ON ST_Contains(p.{{polygon_geom_col}}, pt.{{point_geom_col}})
      GROUP BY p.{{polygon_id_col}}
      ORDER BY point_count DESC
    variables:
      polygon_table: { type: table, required: true }
      point_table: { type: table, required: true }
      polygon_id_col: { type: column, default: id }
      polygon_geom_col: { type: column, default: geom }
      point_geom_col: { type: column, default: geom }
    verified: true
    success_rate: 0.91

  - name: nearest-facility-per-feature
    description: Find the nearest facility for each source feature
    tags: [nearest, facility, distance]
    template: |
      SELECT s.{{source_id_col}}, f.{{facility_id_col}},
             ST_Distance(s.{{source_geom_col}}::geography, f.{{facility_geom_col}}::geography) AS distance_m
      FROM {{source_table}} s
      CROSS JOIN LATERAL (
        SELECT {{facility_id_col}}, {{facility_geom_col}}
        FROM {{facility_table}}
        ORDER BY {{facility_geom_col}} <-> s.{{source_geom_col}}
        LIMIT 1
      ) f
    variables:
      source_table: { type: table, required: true }
      facility_table: { type: table, required: true }
      source_id_col: { type: column, default: id }
      facility_id_col: { type: column, default: id }
      source_geom_col: { type: column, default: geom }
      facility_geom_col: { type: column, default: geom }
    verified: true
    success_rate: 0.91

  - name: deduplicate-by-distance
    description: Flag near-duplicate features within a threshold distance
    tags: [deduplicate, quality, distance]
    template: |
      SELECT a.{{id_col}} AS left_id, b.{{id_col}} AS right_id
      FROM {{target_table}} a
      JOIN {{target_table}} b
        ON a.{{id_col}} < b.{{id_col}}
       AND ST_DWithin(a.{{geom_col}}::geography, b.{{geom_col}}::geography, {{distance_m}})
    variables:
      target_table: { type: table, required: true }
      id_col: { type: column, default: id }
      geom_col: { type: column, default: geom }
      distance_m: { type: float, required: true }
    verified: true
    success_rate: 0.9

  - name: invalid-geometry-check
    description: Find invalid geometries and report the reason
    tags: [quality, geometry, validation]
    template: |
      SELECT {{id_col}}, ST_IsValidReason({{geom_col}}) AS invalid_reason
      FROM {{target_table}}
      WHERE NOT ST_IsValid({{geom_col}})
    variables:
      target_table: { type: table, required: true }
      id_col: { type: column, default: id }
      geom_col: { type: column, default: geom }
    verified: true
    success_rate: 0.9

  - name: geometry-type-summary
    description: Summarize geometry types in a layer
    tags: [summary, geometry, quality]
    template: |
      SELECT ST_GeometryType({{geom_col}}) AS geometry_type, COUNT(*) AS feature_count
      FROM {{target_table}}
      GROUP BY ST_GeometryType({{geom_col}})
      ORDER BY feature_count DESC
    variables:
      target_table: { type: table, required: true }
      geom_col: { type: column, default: geom }
    verified: true
    success_rate: 0.9

  - name: srid-summary
    description: Summarize SRID values in a geometry column
    tags: [summary, srid, quality]
    template: |
      SELECT ST_SRID({{geom_col}}) AS srid, COUNT(*) AS feature_count
      FROM {{target_table}}
      GROUP BY ST_SRID({{geom_col}})
      ORDER BY feature_count DESC
    variables:
      target_table: { type: table, required: true }
      geom_col: { type: column, default: geom }
    verified: true
    success_rate: 0.89

  - name: bounding-box-filter
    description: Filter features by bounding box
    tags: [bbox, filter, extent]
    template: |
      SELECT * FROM {{target_table}}
      WHERE {{geom_col}} && ST_MakeEnvelope({{min_lon}}, {{min_lat}}, {{max_lon}}, {{max_lat}}, {{srid}})
    variables:
      target_table: { type: table, required: true }
      geom_col: { type: column, default: geom }
      min_lon: { type: float, required: true }
      min_lat: { type: float, required: true }
      max_lon: { type: float, required: true }
      max_lat: { type: float, required: true }
      srid: { type: integer, default: "4326" }
    verified: true
    success_rate: 0.89

  - name: extent-aggregate
    description: Compute the spatial extent of a layer
    tags: [extent, summary, bbox]
    template: |
      SELECT ST_Extent({{geom_col}}) AS extent
      FROM {{target_table}}
    variables:
      target_table: { type: table, required: true }
      geom_col: { type: column, default: geom }
    verified: true
    success_rate: 0.89

  - name: line-length-sum
    description: Sum line lengths in meters
    tags: [length, line, aggregate]
    template: |
      SELECT SUM(ST_Length({{geom_col}}::geography)) AS total_length_m
      FROM {{target_table}}
    variables:
      target_table: { type: table, required: true }
      geom_col: { type: column, default: geom }
    verified: true
    success_rate: 0.89

  - name: polygon-area-sum
    description: Sum polygon areas in square meters
    tags: [area, polygon, aggregate]
    template: |
      SELECT SUM(ST_Area({{geom_col}}::geography)) AS total_area_m2
      FROM {{target_table}}
    variables:
      target_table: { type: table, required: true }
      geom_col: { type: column, default: geom }
    verified: true
    success_rate: 0.89

  - name: centroid-export
    description: Compute centroids for polygon features
    tags: [centroid, polygon, transform]
    template: |
      SELECT {{id_col}}, ST_Centroid({{geom_col}}) AS geom
      FROM {{target_table}}
    variables:
      target_table: { type: table, required: true }
      id_col: { type: column, default: id }
      geom_col: { type: column, default: geom }
    verified: true
    success_rate: 0.88

  - name: union-by-category
    description: Dissolve features by category using ST_Union
    tags: [union, dissolve, category]
    template: |
      SELECT {{category_col}}, ST_Union({{geom_col}}) AS geom
      FROM {{target_table}}
      GROUP BY {{category_col}}
    variables:
      target_table: { type: table, required: true }
      category_col: { type: column, required: true }
      geom_col: { type: column, default: geom }
    verified: true
    success_rate: 0.88

  - name: intersection-by-category
    description: Intersect two layers and retain category attributes
    tags: [intersection, overlay, category]
    template: |
      SELECT a.{{left_category_col}}, b.{{right_category_col}},
             ST_Intersection(a.{{left_geom_col}}, b.{{right_geom_col}}) AS geom
      FROM {{left_table}} a
      JOIN {{right_table}} b ON ST_Intersects(a.{{left_geom_col}}, b.{{right_geom_col}})
    variables:
      left_table: { type: table, required: true }
      right_table: { type: table, required: true }
      left_category_col: { type: column, required: true }
      right_category_col: { type: column, required: true }
      left_geom_col: { type: column, default: geom }
      right_geom_col: { type: column, default: geom }
    verified: true
    success_rate: 0.88

  - name: difference-from-boundary
    description: Remove a boundary area from target geometries
    tags: [difference, erase, boundary]
    template: |
      SELECT t.{{id_col}}, ST_Difference(t.{{geom_col}}, b.{{boundary_geom_col}}) AS geom
      FROM {{target_table}} t
      JOIN {{boundary_table}} b ON ST_Intersects(t.{{geom_col}}, b.{{boundary_geom_col}})
      WHERE b.{{boundary_name_col}} = '{{boundary_name}}'
    variables:
      target_table: { type: table, required: true }
      boundary_table: { type: table, required: true }
      id_col: { type: column, default: id }
      geom_col: { type: column, default: geom }
      boundary_geom_col: { type: column, default: geom }
      boundary_name_col: { type: column, default: name }
      boundary_name: { type: string, required: true }
    verified: true
    success_rate: 0.87

  - name: touches-boundary
    description: Find features touching a named boundary geometry
    tags: [touches, boundary, topology]
    template: |
      SELECT t.*
      FROM {{target_table}} t
      JOIN {{boundary_table}} b ON ST_Touches(t.{{geom_col}}, b.{{boundary_geom_col}})
      WHERE b.{{boundary_name_col}} = '{{boundary_name}}'
    variables:
      target_table: { type: table, required: true }
      boundary_table: { type: table, required: true }
      geom_col: { type: column, default: geom }
      boundary_geom_col: { type: column, default: geom }
      boundary_name_col: { type: column, default: name }
      boundary_name: { type: string, required: true }
    verified: true
    success_rate: 0.87

  - name: disjoint-from-boundary
    description: Find features disjoint from a named boundary geometry
    tags: [disjoint, boundary, topology]
    template: |
      SELECT t.*
      FROM {{target_table}} t
      JOIN {{boundary_table}} b ON ST_Disjoint(t.{{geom_col}}, b.{{boundary_geom_col}})
      WHERE b.{{boundary_name_col}} = '{{boundary_name}}'
    variables:
      target_table: { type: table, required: true }
      boundary_table: { type: table, required: true }
      geom_col: { type: column, default: geom }
      boundary_geom_col: { type: column, default: geom }
      boundary_name_col: { type: column, default: name }
      boundary_name: { type: string, required: true }
    verified: true
    success_rate: 0.86

  - name: crossing-lines
    description: Find line features that cross another line layer
    tags: [crosses, line, topology]
    template: |
      SELECT a.*, b.{{right_id_col}} AS matched_id
      FROM {{left_table}} a
      JOIN {{right_table}} b ON ST_Crosses(a.{{left_geom_col}}, b.{{right_geom_col}})
    variables:
      left_table: { type: table, required: true }
      right_table: { type: table, required: true }
      right_id_col: { type: column, default: id }
      left_geom_col: { type: column, default: geom }
      right_geom_col: { type: column, default: geom }
    verified: true
    success_rate: 0.86

  - name: point-density-grid
    description: Aggregate points into a square grid
    tags: [grid, density, point]
    template: |
      WITH grid AS (
        SELECT (ST_SquareGrid({{cell_size}}, ST_Extent({{point_geom_col}}))).geom AS geom
        FROM {{point_table}}
      )
      SELECT g.geom, COUNT(p.*) AS point_count
      FROM grid g
      LEFT JOIN {{point_table}} p ON ST_Intersects(p.{{point_geom_col}}, g.geom)
      GROUP BY g.geom
      ORDER BY point_count DESC
    variables:
      point_table: { type: table, required: true }
      point_geom_col: { type: column, default: geom }
      cell_size: { type: float, required: true }
    verified: true
    success_rate: 0.85

  - name: k-nearest-neighbors
    description: Return the k nearest features to a point
    tags: [nearest, knn, distance]
    template: |
      SELECT *
      FROM {{target_table}}
      ORDER BY {{geom_col}} <-> ST_SetSRID(ST_MakePoint({{lon}}, {{lat}}), 4326)
      LIMIT {{k}}
    variables:
      target_table: { type: table, required: true }
      geom_col: { type: column, default: geom }
      lon: { type: float, required: true }
      lat: { type: float, required: true }
      k: { type: integer, required: true }
    verified: true
    success_rate: 0.85

  - name: topn-nearest-with-distance
    description: Return the nearest features with explicit distance values
    tags: [nearest, distance, ranking]
    template: |
      SELECT *,
             ST_Distance({{geom_col}}::geography, ST_SetSRID(ST_MakePoint({{lon}}, {{lat}}), 4326)::geography) AS distance_m
      FROM {{target_table}}
      ORDER BY distance_m ASC
      LIMIT {{limit_n}}
    variables:
      target_table: { type: table, required: true }
      geom_col: { type: column, default: geom }
      lon: { type: float, required: true }
      lat: { type: float, required: true }
      limit_n: { type: integer, required: true }
    verified: true
    success_rate: 0.85

  - name: within-admin-boundary-and-distance
    description: Filter features inside a named boundary and within a distance to another layer
    tags: [boundary, distance, multi-constraint]
    template: |
      SELECT t.*
      FROM {{target_table}} t
      JOIN {{boundary_table}} b ON ST_Intersects(t.{{geom_col}}, b.{{boundary_geom_col}})
      WHERE b.{{boundary_name_col}} = '{{boundary_name}}'
        AND EXISTS (
          SELECT 1
          FROM {{reference_table}} r
          WHERE ST_DWithin(t.{{geom_col}}::geography, r.{{reference_geom_col}}::geography, {{distance_m}})
        )
    variables:
      target_table: { type: table, required: true }
      boundary_table: { type: table, required: true }
      reference_table: { type: table, required: true }
      geom_col: { type: column, default: geom }
      boundary_geom_col: { type: column, default: geom }
      boundary_name_col: { type: column, default: name }
      boundary_name: { type: string, required: true }
      reference_geom_col: { type: column, default: geom }
      distance_m: { type: float, required: true }
    verified: true
    success_rate: 0.84

  - name: count-by-distance-bands
    description: Count features by concentric distance bands around a point
    tags: [buffer, band, count]
    template: |
      WITH bands AS (
        SELECT 1 AS band_id, ST_Buffer(ST_SetSRID(ST_MakePoint({{lon}}, {{lat}}), 4326)::geography, {{band1_m}})::geometry AS geom
        UNION ALL
        SELECT 2 AS band_id, ST_Difference(
          ST_Buffer(ST_SetSRID(ST_MakePoint({{lon}}, {{lat}}), 4326)::geography, {{band2_m}})::geometry,
          ST_Buffer(ST_SetSRID(ST_MakePoint({{lon}}, {{lat}}), 4326)::geography, {{band1_m}})::geometry
        )
      )
      SELECT band_id, COUNT(t.*) AS feature_count
      FROM bands b
      LEFT JOIN {{target_table}} t ON ST_Intersects(t.{{geom_col}}, b.geom)
      GROUP BY band_id
      ORDER BY band_id
    variables:
      target_table: { type: table, required: true }
      geom_col: { type: column, default: geom }
      lon: { type: float, required: true }
      lat: { type: float, required: true }
      band1_m: { type: float, required: true }
      band2_m: { type: float, required: true }
    verified: true
    success_rate: 0.84

  - name: line-intersection-points
    description: Extract intersection points between two line layers
    tags: [intersection, line, point]
    template: |
      SELECT ST_Intersection(a.{{left_geom_col}}, b.{{right_geom_col}}) AS geom
      FROM {{left_table}} a
      JOIN {{right_table}} b ON ST_Intersects(a.{{left_geom_col}}, b.{{right_geom_col}})
    variables:
      left_table: { type: table, required: true }
      right_table: { type: table, required: true }
      left_geom_col: { type: column, default: geom }
      right_geom_col: { type: column, default: geom }
    verified: true
    success_rate: 0.84

  - name: multipart-to-singlepart-check
    description: Identify multipart geometries for normalization
    tags: [multipart, quality, geometry]
    template: |
      SELECT {{id_col}}
      FROM {{target_table}}
      WHERE ST_NumGeometries({{geom_col}}) > 1
    variables:
      target_table: { type: table, required: true }
      id_col: { type: column, default: id }
      geom_col: { type: column, default: geom }
    verified: true
    success_rate: 0.83

  - name: empty-geometry-check
    description: Find empty geometries in a layer
    tags: [quality, empty, geometry]
    template: |
      SELECT {{id_col}}
      FROM {{target_table}}
      WHERE ST_IsEmpty({{geom_col}})
    variables:
      target_table: { type: table, required: true }
      id_col: { type: column, default: id }
      geom_col: { type: column, default: geom }
    verified: true
    success_rate: 0.83

  - name: boundary-adjacency-count
    description: Count adjacent polygons touching each polygon
    tags: [adjacency, polygon, touches]
    template: |
      SELECT a.{{id_col}}, COUNT(b.*) AS adjacent_count
      FROM {{target_table}} a
      LEFT JOIN {{target_table}} b
        ON a.{{id_col}} <> b.{{id_col}}
       AND ST_Touches(a.{{geom_col}}, b.{{geom_col}})
      GROUP BY a.{{id_col}}
      ORDER BY adjacent_count DESC
    variables:
      target_table: { type: table, required: true }
      id_col: { type: column, default: id }
      geom_col: { type: column, default: geom }
    verified: true
    success_rate: 0.83

  - name: category-majority-overlay
    description: Find the dominant overlay category by intersection area
    tags: [overlay, category, majority]
    template: |
      SELECT DISTINCT ON (a.{{left_id_col}})
             a.{{left_id_col}},
             b.{{right_category_col}},
             ST_Area(ST_Intersection(a.{{left_geom_col}}, b.{{right_geom_col}})) AS overlap_area
      FROM {{left_table}} a
      JOIN {{right_table}} b ON ST_Intersects(a.{{left_geom_col}}, b.{{right_geom_col}})
      ORDER BY a.{{left_id_col}}, overlap_area DESC
    variables:
      left_table: { type: table, required: true }
      right_table: { type: table, required: true }
      left_id_col: { type: column, default: id }
      right_category_col: { type: column, required: true }
      left_geom_col: { type: column, default: geom }
      right_geom_col: { type: column, default: geom }
    verified: true
    success_rate: 0.82

  - name: attribute-filtered-spatial-join
    description: Spatial join with an additional attribute filter on the joined layer
    tags: [join, attribute, filter]
    template: |
      SELECT a.*, b.*
      FROM {{left_table}} a
      JOIN {{right_table}} b
        ON ST_Intersects(a.{{left_geom_col}}, b.{{right_geom_col}})
      WHERE b.{{filter_col}} = '{{filter_value}}'
    variables:
      left_table: { type: table, required: true }
      right_table: { type: table, required: true }
      left_geom_col: { type: column, default: geom }
      right_geom_col: { type: column, default: geom }
      filter_col: { type: column, required: true }
      filter_value: { type: string, required: true }
    verified: true
    success_rate: 0.82

  - name: point-cluster-dbscan
    description: Cluster points with DBSCAN
    tags: [cluster, point, dbscan]
    template: |
      SELECT {{id_col}},
             ST_ClusterDBSCAN({{geom_col}}, eps := {{eps}}, minpoints := {{min_points}}) OVER () AS cluster_id
      FROM {{target_table}}
    variables:
      target_table: { type: table, required: true }
      id_col: { type: column, default: id }
      geom_col: { type: column, default: geom }
      eps: { type: float, required: true }
      min_points: { type: integer, required: true }
    verified: true
    success_rate: 0.81

  - name: nearest-boundary-distance
    description: Measure distance from features to the nearest boundary feature
    tags: [boundary, nearest, distance]
    template: |
      SELECT t.{{id_col}},
             MIN(ST_Distance(t.{{geom_col}}::geography, b.{{boundary_geom_col}}::geography)) AS nearest_distance_m
      FROM {{target_table}} t
      JOIN {{boundary_table}} b ON TRUE
      GROUP BY t.{{id_col}}
      ORDER BY nearest_distance_m ASC
    variables:
      target_table: { type: table, required: true }
      boundary_table: { type: table, required: true }
      id_col: { type: column, default: id }
      geom_col: { type: column, default: geom }
      boundary_geom_col: { type: column, default: geom }
    verified: true
    success_rate: 0.81
